name: EbbFlow
options:
  bundleIdPrefix: com.ebbflow
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: 3VSNQ93JZN
    CODE_SIGN_STYLE: Automatic
targets:
  EbbFlow:
    type: application
    platform: iOS
    sources:
      - path: EbbFlow
        excludes:
          - "**/.DS_Store"
      - path: Shared
    resources:
      - path: EbbFlow/Resources/Assets.xcassets
        buildPhase: resources
      - path: EbbFlow/Resources/Fixtures
        buildPhase: resources
      - path: EbbFlow/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    entitlements:
      path: EbbFlow/EbbFlow.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ebbflow.shared
    dependencies:
      - target: EbbFlowWidgets
        embed: true
        platformFilter: iOS
      - target: EbbFlowWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ebbflow.app
        PRODUCT_NAME: EbbFlow
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Ebb & Flow"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.ebbflow.app.watch
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Ebb & Flow uses your location to find the nearest tide station."
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        SUPPORTS_MACCATALYST: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        ENABLE_PREVIEWS: YES
    scheme:
      testTargets:
        - EbbFlowTests
  EbbFlowWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: EbbFlowWidgets
      - path: Shared
    resources:
      - path: EbbFlowWidgets/PrivacyInfo.xcprivacy
        buildPhase: resources
    entitlements:
      path: EbbFlowWidgets/EbbFlowWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ebbflow.shared
    info:
      path: EbbFlowWidgets/Info.plist
      properties:
        CFBundleDisplayName: "Ebb & Flow Widgets"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ebbflow.app.EbbFlowWidgets
        PRODUCT_NAME: EbbFlowWidgets
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        SKIP_INSTALL: YES
  EbbFlowWatch:
    type: application
    platform: watchOS
    sources:
      - path: EbbFlowWatch
      - path: Shared
    resources:
      - path: EbbFlowWatch/Assets.xcassets
        buildPhase: resources
      - path: EbbFlowWatch/PrivacyInfo.xcprivacy
        buildPhase: resources
    entitlements:
      path: EbbFlowWatch/EbbFlowWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ebbflow.shared
    dependencies:
      - target: EbbFlowWatchWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ebbflow.app.watch
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.ebbflow.app
        WATCHOS_DEPLOYMENT_TARGET: "26.0"
        SKIP_INSTALL: YES
  EbbFlowWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - path: EbbFlowWatchWidgets
      - path: Shared
    resources:
      - path: EbbFlowWatchWidgets/PrivacyInfo.xcprivacy
        buildPhase: resources
    entitlements:
      path: EbbFlowWatchWidgets/EbbFlowWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ebbflow.shared
    info:
      path: EbbFlowWatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: "Ebb & Flow Complications"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ebbflow.app.watch.widgets
        PRODUCT_NAME: EbbFlowWatchWidgets
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: YES
        WATCHOS_DEPLOYMENT_TARGET: "26.0"
        SKIP_INSTALL: YES
  EbbFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EbbFlowTests
        excludes:
          - "**/.DS_Store"
    resources:
      - path: EbbFlowTests/Fixtures
        buildPhase: resources
    dependencies:
      - target: EbbFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ebbflow.app.tests
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
schemes:
  EbbFlow:
    build:
      targets:
        EbbFlow: all
        EbbFlowWidgets: all
        EbbFlowWatch: all
        EbbFlowWatchWidgets: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EbbFlowTests
  EbbFlowTests:
    build:
      targets:
        EbbFlow: all
        EbbFlowWidgets: all
        EbbFlowTests: [test]
    test:
      config: Debug
      targets:
        - EbbFlowTests
  EbbFlowWatch:
    build:
      targets:
        EbbFlowWatch: all
        EbbFlowWatchWidgets: all
    run:
      config: Debug
  EbbFlowWatchWidgets:
    build:
      targets:
        EbbFlowWatchWidgets: all
    run:
      config: Debug